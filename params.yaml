project:
  name: credit-card-fraud-clustering
  random_seed: 42

data:
  raw_filename: creditcard.csv
  train_fraction: 0.80
  remove_exact_duplicates: true

sampling:
  hopkins_reference_size: 20000
  hopkins_m: 500
  hopkins_repetitions: 5
  vat_size: 500
  embedding_size: 10000
  metric_comparison_size: 3000

features:
  include_v_features: true
  include_log_amount: true
  include_cyclic_time: true
  include_elapsed_day: false

pca:
  variance_threshold: 0.95
  max_components: 30

umap:
  n_neighbors: 30
  min_dist: 0.05
  n_components: 2
  metric: euclidean

output:
  save_float_dtype: float32